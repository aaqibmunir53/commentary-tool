<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commentary Video Tool</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0a0e14;
            color: #c5cdd8;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .container {
            width: 100%;
            max-width: 720px;
            text-align: center;
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #e2e8f0;
            margin-bottom: 8px;
        }
        .subtitle {
            font-size: 14px;
            color: #6b7a8d;
            margin-bottom: 48px;
        }
        .card-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 560px) {
            .card-grid {
                grid-template-columns: 1fr;
            }
        }
        .card {
            background: #0d1117;
            border: 1px solid #1e2a3a;
            border-radius: 12px;
            padding: 36px 28px;
            text-align: left;
            cursor: pointer;
            transition: all 0.25s ease;
            text-decoration: none;
            display: block;
        }
        .card:hover {
            border-color: #4fc3f7;
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(79, 195, 247, 0.08);
        }
        .card-icon {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            margin-bottom: 20px;
        }
        .card-icon.blue {
            background: rgba(79, 195, 247, 0.12);
            color: #4fc3f7;
        }
        .card-icon.purple {
            background: rgba(171, 130, 255, 0.12);
            color: #ab82ff;
        }
        .card h2 {
            font-size: 18px;
            font-weight: 700;
            color: #e2e8f0;
            margin-bottom: 8px;
        }
        .card p {
            font-size: 13px;
            color: #6b7a8d;
            line-height: 1.6;
        }
        .card .arrow {
            display: inline-block;
            margin-top: 20px;
            font-size: 13px;
            font-weight: 600;
            color: #4fc3f7;
            letter-spacing: 0.3px;
        }
        .card:nth-child(2) .arrow {
            color: #ab82ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Commentary Video Tool</h1>
        <p class="subtitle">Choose a workflow to get started</p>

        <div class="card-grid">
            <a href="/script" class="card">
                <div class="card-icon blue">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                </div>
                <h2>Script to Avatar</h2>
                <p>Paste your script and generate a single HeyGen avatar video. No editing, no assembly.</p>
                <span class="arrow">Open &rarr;</span>
            </a>

            <a href="/commentary" class="card">
                <div class="card-icon purple">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
                </div>
                <h2>CommentaryAI</h2>
                <p>Full pipeline: YouTube URL to finished commentary video with AI script, voiceover, and assembly.</p>
                <span class="arrow">Open &rarr;</span>
            </a>
        </div>
    </div>
</body>
</html>
